name: CI Checks

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ./src
    steps:
      - uses: actions/checkout@v3
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Lint with flake8
        run: |
          uv run flake8 ./src --count --select=E9,F63,F7,F82 --show-source --statistics
          uv run flake8 ./src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run MyPy
        run: uv run mypy --ignore-missing-imports --check-untyped-defs ./src

      - name: Run tests and generate coverage report
        run: uv run pytest --cov=src --cov-report=term-missing > pytest-coverage.txt

      - name: Comment coverage on PR
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-coverage-path: pytest-coverage.txt
