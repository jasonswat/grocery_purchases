services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    shm_size: 1gb
    environment:
      - KROGER_USERNAME=${KROGER_USERNAME:-your_username}
      - KROGER_PASSWORD=${KROGER_PASSWORD:-your_password}
      - LOGLEVEL=${LOGLEVEL:-INFO}
      - HEADLESS=${HEADLESS:-False}
      - TIMEOUT=${TIMEOUT:-60000}
      - MAX_SLEEP=${MAX_SLEEP:-20}
    # Use the image's default CMD which runs via `uv run` to activate the venv
